name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo doc --workspace --no-deps
      - run: cargo test -p suzu-script --features lua
      - run: cargo run -p suzu-launcher -- --check
      - run: cargo run -p suzu-xp3-viewer -- --check
      - run: cargo run -p suzu-editor -- --check
      - shell: pwsh
        run: ./scripts/package-desktop.ps1 -Check

  build:
    name: Build ${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: project-suzu-linux-x64
            exe: ""
          - os: windows-latest
            artifact: project-suzu-windows-x64
            exe: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force dist/assets | Out-Null
          New-Item -ItemType Directory -Force dist/assets/branding | Out-Null
          New-Item -ItemType Directory -Force dist/docs | Out-Null
          Copy-Item "target/release/suzu-compiler${{ matrix.exe }}" "dist/suzu-compiler${{ matrix.exe }}"
          Copy-Item "target/release/suzu-packer${{ matrix.exe }}" "dist/suzu-packer${{ matrix.exe }}"
          Copy-Item "target/release/suzu-bench${{ matrix.exe }}" "dist/suzu-bench${{ matrix.exe }}"
          Copy-Item "target/release/suzu-editor${{ matrix.exe }}" "dist/suzu-editor${{ matrix.exe }}"
          Copy-Item "target/release/suzu-launcher${{ matrix.exe }}" "dist/suzu-launcher${{ matrix.exe }}"
          Copy-Item "target/release/suzu-xp3-viewer${{ matrix.exe }}" "dist/suzu-xp3-viewer${{ matrix.exe }}"
          Copy-Item "target/release/suzu-hello-world${{ matrix.exe }}" "dist/suzu-hello-world${{ matrix.exe }}"
          Copy-Item "target/release/suzu-branching-story${{ matrix.exe }}" "dist/suzu-branching-story${{ matrix.exe }}"
          Copy-Item "target/release/suzu-ui-save-load-demo${{ matrix.exe }}" "dist/suzu-ui-save-load-demo${{ matrix.exe }}"
          Copy-Item README.md dist/README.md
          Copy-Item README.zh-CN.md dist/README.zh-CN.md
          Copy-Item CONTRIBUTING.md dist/CONTRIBUTING.md
          Copy-Item SECURITY.md dist/SECURITY.md
          Copy-Item LEGAL.md dist/LEGAL.md
          Copy-Item LICENSE-MIT dist/LICENSE-MIT
          Copy-Item LICENSE-APACHE dist/LICENSE-APACHE
          Copy-Item THIRD_PARTY_LICENSES.md dist/THIRD_PARTY_LICENSES.md
          Copy-Item CHANGELOG.md dist/CHANGELOG.md
          Copy-Item assets/branding/Suzu_icon.png dist/assets/branding/Suzu_icon.png
          Copy-Item assets/branding/README.md dist/assets/branding/README.md
          Copy-Item docs/framework-guide.md dist/docs/framework-guide.md
          Copy-Item docs/implementation-checklist.md dist/docs/implementation-checklist.md
          Copy-Item docs/user-guide.md dist/docs/user-guide.md
          Copy-Item docs/scripting-reference.md dist/docs/scripting-reference.md
          Copy-Item docs/xp3-support.md dist/docs/xp3-support.md
          Copy-Item docs/xp3-plugin-interface.md dist/docs/xp3-plugin-interface.md
          Copy-Item docs/api-stability.md dist/docs/api-stability.md
          Copy-Item docs/visual-script-editor-development-plan.md dist/docs/visual-script-editor-development-plan.md
          Copy-Item docs/release-packaging.md dist/docs/release-packaging.md
          Copy-Item docs/developer-checks.md dist/docs/developer-checks.md
          Copy-Item docs/release-checklist.md dist/docs/release-checklist.md
          foreach ($required in @("THIRD_PARTY_LICENSES.md", "assets/branding/README.md", "LEGAL.md", "SECURITY.md", "docs/framework-guide.md", "docs/xp3-support.md", "docs/xp3-plugin-interface.md", "docs/api-stability.md")) {
            if (-not (Test-Path "dist/$required")) {
              throw "Missing release package file: $required"
            }
          }
          & "target/release/suzu-packer${{ matrix.exe }}" examples/hello-world --pack dist/assets/hello-world.suzupack
          & "target/release/suzu-packer${{ matrix.exe }}" examples/hello-world --output dist/assets/hello-world-assets.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## Changes"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes from \`$previous_tag\` to \`$current_tag\`:"
              echo
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
              echo
              git log --oneline --no-decorate "${previous_tag}..${current_tag}" | sed 's/^/- /'
            else
              echo "Initial release for \`$current_tag\`."
              echo
              git log --oneline --no-decorate | sed 's/^/- /'
            fi
          } > RELEASE_NOTES.md

      - name: Archive artifacts
        run: |
          cd artifacts
          for dir in *; do
            archive_name="${dir/project-suzu-/project-suzu-${GITHUB_REF_NAME}-}.tar.gz"
            tar -czf "$archive_name" "$dir"
          done

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/*.tar.gz
