name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo doc --workspace --no-deps
      - run: cargo test -p suzu-script --features lua
      - run: cargo run -p suzu-launcher -- --check
      - run: cargo run -p suzu-player -- --check templates/krkr-like-vn
      - run: cargo run -p suzu-xp3-viewer -- --check
      - run: cargo run -p suzu-editor -- --check
      - shell: pwsh
        run: ./scripts/package-desktop.ps1 -Check

  build:
    name: Build ${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: project-suzu-linux-x64
            exe: ""
          - os: windows-latest
            artifact: project-suzu-windows-x64
            exe: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force dist/assets | Out-Null
          New-Item -ItemType Directory -Force dist/assets/branding | Out-Null
          New-Item -ItemType Directory -Force dist/docs | Out-Null
          New-Item -ItemType Directory -Force dist/templates | Out-Null
          Copy-Item "target/release/suzu-compiler${{ matrix.exe }}" "dist/suzu-compiler${{ matrix.exe }}"
          Copy-Item "target/release/suzu-packer${{ matrix.exe }}" "dist/suzu-packer${{ matrix.exe }}"
          Copy-Item "target/release/suzu-bench${{ matrix.exe }}" "dist/suzu-bench${{ matrix.exe }}"
          Copy-Item "target/release/suzu-player${{ matrix.exe }}" "dist/suzu-player${{ matrix.exe }}"
          Copy-Item "target/release/suzu-editor${{ matrix.exe }}" "dist/suzu-editor${{ matrix.exe }}"
          Copy-Item "target/release/suzu-launcher${{ matrix.exe }}" "dist/suzu-launcher${{ matrix.exe }}"
          Copy-Item "target/release/suzu-xp3-viewer${{ matrix.exe }}" "dist/suzu-xp3-viewer${{ matrix.exe }}"
          Copy-Item "target/release/suzu-hello-world${{ matrix.exe }}" "dist/suzu-hello-world${{ matrix.exe }}"
          Copy-Item "target/release/suzu-branching-story${{ matrix.exe }}" "dist/suzu-branching-story${{ matrix.exe }}"
          Copy-Item "target/release/suzu-ui-save-load-demo${{ matrix.exe }}" "dist/suzu-ui-save-load-demo${{ matrix.exe }}"
          Copy-Item "target/release/suzu-short-vn-demo${{ matrix.exe }}" "dist/suzu-short-vn-demo${{ matrix.exe }}"
          $rootDocFiles = @(
            "README.md",
            "README.zh-CN.md",
            "CONTRIBUTING.md",
            "CONTRIBUTING.zh-CN.md",
            "SECURITY.md",
            "SECURITY.zh-CN.md",
            "LEGAL.md",
            "LEGAL.zh-CN.md",
            "LICENSE-MIT",
            "LICENSE-APACHE",
            "THIRD_PARTY_LICENSES.md",
            "THIRD_PARTY_LICENSES.zh-CN.md",
            "CHANGELOG.md",
            "CHANGELOG.zh-CN.md"
          )
          $brandingFiles = @(
            "assets/branding/Suzu_icon.png",
            "assets/branding/README.md",
            "assets/branding/README.zh-CN.md"
          )
          $docFiles = @(
            "docs/framework-guide.md",
            "docs/framework-guide.zh-CN.md",
            "docs/getting-started.md",
            "docs/getting-started.zh-CN.md",
            "docs/implementation-checklist.md",
            "docs/implementation-checklist.zh-CN.md",
            "docs/user-guide.md",
            "docs/user-guide.zh-CN.md",
            "docs/project-layout.md",
            "docs/project-layout.zh-CN.md",
            "docs/scripting-reference.md",
            "docs/scripting-reference.zh-CN.md",
            "docs/short-vn-demo.md",
            "docs/short-vn-demo.zh-CN.md",
            "docs/xp3-support.md",
            "docs/xp3-support.zh-CN.md",
            "docs/xp3-plugin-interface.md",
            "docs/xp3-plugin-interface.zh-CN.md",
            "docs/api-stability.md",
            "docs/api-stability.zh-CN.md",
            "docs/visual-script-editor-development-plan.md",
            "docs/visual-script-editor-development-plan.zh-CN.md",
            "docs/project-plan.md",
            "docs/project-plan.zh-CN.md",
            "docs/release-packaging.md",
            "docs/release-packaging.zh-CN.md",
            "docs/developer-checks.md",
            "docs/developer-checks.zh-CN.md",
            "docs/release-checklist.md",
            "docs/release-checklist.zh-CN.md"
          )
          foreach ($rootDocFile in $rootDocFiles) {
            Copy-Item $rootDocFile "dist/$rootDocFile"
          }
          foreach ($brandingFile in $brandingFiles) {
            Copy-Item $brandingFile "dist/$brandingFile"
          }
          foreach ($docFile in $docFiles) {
            Copy-Item $docFile "dist/$docFile"
          }
          Copy-Item templates/minimal-vn dist/templates/minimal-vn -Recurse
          Copy-Item templates/krkr-like-vn dist/templates/krkr-like-vn -Recurse
          foreach ($required in @(
            "THIRD_PARTY_LICENSES.md",
            "THIRD_PARTY_LICENSES.zh-CN.md",
            "assets/branding/README.md",
            "assets/branding/README.zh-CN.md",
            "LEGAL.md",
            "LEGAL.zh-CN.md",
            "SECURITY.md",
            "SECURITY.zh-CN.md",
            "docs/framework-guide.md",
            "docs/framework-guide.zh-CN.md",
            "docs/getting-started.md",
            "docs/getting-started.zh-CN.md",
            "docs/project-layout.md",
            "docs/project-layout.zh-CN.md",
            "docs/short-vn-demo.md",
            "docs/short-vn-demo.zh-CN.md",
            "docs/xp3-support.md",
            "docs/xp3-support.zh-CN.md",
            "docs/xp3-plugin-interface.md",
            "docs/xp3-plugin-interface.zh-CN.md",
            "docs/api-stability.md",
            "docs/api-stability.zh-CN.md",
            "templates/minimal-vn/README.md",
            "templates/minimal-vn/README.zh-CN.md",
            "templates/krkr-like-vn/README.md",
            "templates/krkr-like-vn/README.zh-CN.md"
          )) {
            if (-not (Test-Path "dist/$required")) {
              throw "Missing release package file: $required"
            }
          }
          & "target/release/suzu-packer${{ matrix.exe }}" examples/hello-world --pack dist/assets/hello-world.suzupack
          & "target/release/suzu-packer${{ matrix.exe }}" examples/hello-world --output dist/assets/hello-world-assets.json
          & "target/release/suzu-packer${{ matrix.exe }}" examples/short-vn-demo --pack dist/assets/short-vn-demo.suzupack
          & "target/release/suzu-packer${{ matrix.exe }}" examples/short-vn-demo --output dist/assets/short-vn-demo-assets.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          {
            echo "## Changes"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes from \`$previous_tag\` to \`$current_tag\`:"
              echo
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
              echo
              git log --oneline --no-decorate "${previous_tag}..${current_tag}" | sed 's/^/- /'
            else
              echo "Initial release for \`$current_tag\`."
              echo
              git log --oneline --no-decorate | sed 's/^/- /'
            fi
          } > RELEASE_NOTES.md

      - name: Archive artifacts
        run: |
          cd artifacts
          for dir in *; do
            archive_name="${dir/project-suzu-/project-suzu-${GITHUB_REF_NAME}-}.tar.gz"
            tar -czf "$archive_name" "$dir"
          done

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: artifacts/*.tar.gz
